name: Get 3

on:
  push:
    branches:
      - main

jobs:
  convert_ipvt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Download M3U file
        run: |
          curl -s -o ipv6.m3u https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/ipv6.m3u

      - name: Convert M3U to TXT
        run: |
          echo "央视频道,#genre#" > zb3.txt
          echo "卫视频道,#genre#" >> zb3.txt
          echo "数字频道,#genre#" >> zb3.txt
          
          # 提取央视频道
          sed -n 's/^#EXTINF:-1 tvg-name="$[^"]*$".*group-title="央视频道",$.*$/\1,\2/p' ipv6.m3u >> zb3.txt
          
          # 提取卫视频道
          sed -n 's/^#EXTINF:-1 tvg-name="$[^"]*$".*group-title="卫视频道",$.*$/\1,\2/p' ipv6.m3u >> zb3.txt
          
          # 提取数字频道
          sed -n 's/^#EXTINF:-1 tvg-name="$[^"]*$".*group-title="数字频道",$.*$/\1,\2/p' ipv6.m3u >> zb3.txt

      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: zb3
          path: zb3.txt

      - name: Clean up
        run: |
          rm ipv6.m3u
